name: Deploy Frontend to Vercel

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-frontend
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Pull Vercel production config
        run: pnpm dlx vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel production output
        run: pnpm dlx vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy Vercel production output
        run: pnpm dlx vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
